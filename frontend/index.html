<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CleanPulse - The next-generation AI-powered waste management ecosystem. Report waste, earn eco-credits, and track real-time city cleaning impact." />
    <meta name="keywords" content="waste management, AI recycling, clean city, eco-credits, environmental impact, real-time cleanup" />
    <meta name="author" content="CleanPulse Team" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cleanpulse.onrender.com/" />
    <meta property="og:title" content="CleanPulse | AI-Powered Waste Management" />
    <meta property="og:description" content="Join the revolution in city cleaning. Help us keep the world clean with AI-driven reporting and real-time operations." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://cleanpulse.onrender.com/" />
    <meta property="twitter:title" content="CleanPulse | AI-Powered Waste Management" />
    <meta property="twitter:description" content="Report waste, earn eco-credits, and save the planet with CleanPulse." />
    <meta property="twitter:image" content="/logo.png" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2D6A4F" />
    <title>CleanPulse | Live AI Eco-System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
